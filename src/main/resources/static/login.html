<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - AI职业规划智能体</title>
    <style>
        :root {
            --bg: #f5f8fd;
            --card: rgba(255, 255, 255, 0.88);
            --card-solid: #fff;
            --line: rgba(15, 23, 42, 0.08);
            --line-strong: rgba(79, 142, 247, 0.18);
            --text: #0f172a;
            --muted: #64748b;
            --primary: #4f8ef7;
            --primary-2: #2f6ee6;
            --primary-soft: rgba(79, 142, 247, 0.10);
            --accent: #8b5cf6;
            --success: #16a34a;
            --warning: #f59e0b;
            --danger: #ef4444;
            --shadow: 0 16px 40px rgba(15, 23, 42, 0.08);
            --shadow-soft: 0 10px 28px rgba(15, 23, 42, 0.05);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
            color: var(--text);
            background:
                    radial-gradient(circle at 10% 5%, rgba(79, 142, 247, 0.14), transparent 24%),
                    radial-gradient(circle at 90% 10%, rgba(139, 92, 246, 0.10), transparent 18%),
                    radial-gradient(circle at 50% 90%, rgba(79, 142, 247, 0.08), transparent 30%),
                    linear-gradient(180deg, #f8fbff 0%, #f5f8fd 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        button,
        input {
            font: inherit;
        }

        button {
            border: 0;
            cursor: pointer;
        }

        .login-container {
            width: 100%;
            max-width: 520px;
            padding: 40px 24px;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-card {
            background: var(--card);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: var(--radius-xl);
            padding: 56px 48px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--accent));
        }

        .brand-section {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-title {
            font-size: 32px;
            font-weight: 700;
            color: var(--text);
            margin: 0 0 12px;
            letter-spacing: -0.5px;
        }

        .brand-subtitle {
            font-size: 16px;
            color: var(--muted);
            margin: 0;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-group label {
            display: block;
            font-size: 15px;
            font-weight: 500;
            color: var(--text);
            margin-bottom: 10px;
        }

        .input-wrapper {
            position: relative;
        }
        .input-icon {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--muted);
            font-size: 18px;
            z-index: 1;
        }
        
        .form-input {
            width: 100%;
            padding: 18px 18px 18px 10px;
            border: 1px solid var(--line);
            border-radius: var(--radius-md);
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            font-size: 16px;
            color: var(--text);
            transition: all 0.2s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-soft);
            background: rgba(255, 255, 255, 0.9);
        }

        .form-input::placeholder {
            color: var(--muted);
        }

        .login-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            color: white;
            border: none;
            border-radius: var(--radius-md);
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            position: relative;
            overflow: hidden;
        }

        .login-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.5s;
        }

        .login-button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(79, 142, 247, 0.3);
        }

        .login-button:hover::before {
            left: 100%;
        }

        .login-button:active {
            transform: translateY(0);
        }

        .message {
            padding: 12px 16px;
            margin: 16px 0;
            border-radius: var(--radius-sm);
            font-size: 14px;
            display: none;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: block;
        }

        .success {
            background: rgba(22, 163, 74, 0.1);
            color: var(--success);
            border: 1px solid rgba(22, 163, 74, 0.2);
            display: block;
        }

        .demo-info {
            margin-top: 24px;
            padding: 16px;
            background: var(--primary-soft);
            border-radius: var(--radius-sm);
            border: 1px solid var(--line-strong);
        }

        .demo-info-title {
            font-size: 12px;
            font-weight: 600;
            color: var(--primary);
            margin: 0 0 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .demo-info-content {
            font-size: 13px;
            color: var(--muted);
            line-height: 1.5;
        }

        .demo-info code {
            background: rgba(79, 142, 247, 0.15);
            padding: 2px 6px;
            border-radius: 6px;
            font-family: 'SF Mono', 'Monaco', 'Cascadia Code', monospace;
            color: var(--primary-2);
        }

        .floating-shapes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
        }

        .shape-1 {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            top: 10%;
            left: 5%;
            animation: float 6s ease-in-out infinite;
        }

        .shape-2 {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--accent), var(--primary));
            top: 60%;
            right: 8%;
            animation: float 8s ease-in-out infinite reverse;
        }

        .shape-3 {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, var(--primary-2), var(--primary));
            bottom: 20%;
            left: 15%;
            animation: float 7s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(180deg);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 16px;
            }

            .login-card {
                padding: 32px 24px;
            }

            .brand-title {
                font-size: 28px;
            }
        }

        .checkbox-group {
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 20px 0 16px;
    font-size: 14px;
    color: var(--muted);
}

.checkbox-group input {
    width: 18px;
    height: 18px;
    cursor: pointer;
    accent-color: var(--primary);
}

.checkbox-group label {
    cursor: pointer;
    user-select: none;
}

.checkbox-group a {
    color: var(--primary);
    text-decoration: none;
}

.checkbox-group a:hover {
    text-decoration: underline;
}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="brand-section">
                <h1 class="brand-title">AI职业规划智能体</h1>
                <p class="brand-subtitle">登录账户</p>
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label for="username">用户名</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="text" id="username" class="form-input" placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="password">密码</label>
                    <div class="input-wrapper">
                        <span class="input-icon"></span>
                        <input type="password" id="password" class="form-input" placeholder="请输入密码" required>
                    </div>
                </div>

                <div class="checkbox-group">
    <input type="checkbox" id="agreeCheckbox">
    <label for="agreeCheckbox">
        我已阅读并同意 <a href="./user_agreement.html" target="_blank">《用户协议》</a> 和 <a href="./privacy_policy.html" target="_blank">《隐私政策》</a>
    </label>
</div>

                <div id="message" class="message"></div>
                    <button type="submit" class="login-button">
                    立即登录
                    </button>    
            </form>
            <div class="demo-info">
                <div class="demo-info-title">使用提示</div>
                <div class="demo-info-content">
                    请使用您注册的用户名和密码登录<br>
                    如果还没有账户，请先<a href="register.html" style="color: var(--primary); text-decoration: underline;">注册新账户</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const message = document.getElementById('message');

            if (!username || !password) {
                message.className = 'message error';
                message.textContent = '请输入用户名和密码';
                return;
            }

            // 在 if (!username || !password) 之后添加
            const agreeCheckbox = document.getElementById('agreeCheckbox');
            if (!agreeCheckbox.checked) {
            message.className = 'message error';
            message.textContent = '请阅读并同意用户协议和隐私政策';
                return;
            }

            // --- 开始对接后端 ---
            fetch('/auth/login', {  // 请确保后端 Controller 的登录路径是 /auth/login
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
            })
                .then(response => response.json())
                .then(data => {
                    // 同样判断 code 是否为 200
                    console.log('登录响应:', data);
                    if (data.code === 200) {
                        console.log('Login successful, saving user data:', data);
                        // 保存用户信息到本地（以后显示头像或名字用）
                        const userInfo = {
                            username: username,
                            role: data.data.user?.role || 'user',
                            loginTime: new Date().toISOString()
                        };
                        console.log('保存用户信息:', userInfo);
                        console.log('保存的token:', data.data.token);
                        localStorage.setItem('current_user', JSON.stringify(userInfo));
                        // 保存JWT token
                        localStorage.setItem('jwt_token', data.data.token);
                        localStorage.setItem('isLoggedIn', 'true');

                        console.log('User data saved to localStorage, preparing redirect...');
                        message.className = 'message success';
                        message.textContent = '登录成功！正在跳转...';

                        setTimeout(() => {
                            const redirectUrl = 'index.html?token=' + encodeURIComponent(data.data.token);
                            console.log('Redirecting to:', redirectUrl);
                            window.location.href = redirectUrl;
                        }, 1000);
                    } else {
                        // 显示后端返回的具体错误（比如：密码错误、用户不存在）
                        message.className = 'message error';
                        message.textContent = data.message || '登录失败，请检查账号密码';
                    }
                })
                .catch(() => {
                    message.className = 'message error';
                    message.textContent = '服务器连接失败，请检查后端是否启动';
                });
        }

        // 表单提交处理
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            login();
        });

        // 允许Enter键提交
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                login();
            }
        });

        // 输入框动画效果
        const inputs = document.querySelectorAll('.form-input');
        inputs.forEach(input => {
            input.addEventListener('focus', function() {
                this.parentElement.style.transform = 'translateY(-2px)';
            });

            input.addEventListener('blur', function() {
                this.parentElement.style.transform = 'translateY(0)';
            });
        });
    </script>
</body>
</html>
