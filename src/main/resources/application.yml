spring:
  datasource:
    url: jdbc:mysql://localhost:3306/career_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  ai:
    deepseek:
      api-key: ${DEEPSEEK_API_KEY}
      chat:
        options:
          model: deepseek-chat
          temperature: 0.1
          timeout: 60s
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
      enabled: true


file:
  upload-dir: R:\\Java-learning\\career-planning-agent\\src\\main\\resources\\static\\uploads

logging:
  level:
    root: INFO


mybatis:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath:mapper/*.xml